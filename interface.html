<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien-LLM | Neural Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff88;
            --deep-purple: #1a0b2e;
            --plasma-blue: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050208 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ambient Background Nodes */
        .ambient-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--neon-green) 0%, transparent 70%);
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            animation: drift 20s infinite alternate;
        }

        @keyframes drift {
            from { transform: translate(-100px, -100px); }
            to { transform: translate(100px, 100px); }
        }

        header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(90deg, var(--neon-green), var(--plasma-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .chat-container {
            flex: 1;
            width: 90%;
            max-width: 800px;
            margin: 2rem 0;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding-right: 1rem;
        }

        .message {
            margin-bottom: 1.5rem;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .role-user { color: var(--plasma-blue); font-weight: 700; margin-right: 8px; }
        .role-ai { color: var(--neon-green); font-weight: 700; margin-right: 8px; }

        .input-area {
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        button {
            background: linear-gradient(135deg, var(--neon-green) 0%, #00b36e 100%);
            border: none;
            border-radius: 12px;
            padding: 0 1.5rem;
            color: black;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--neon-green);
        }

        .status {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="ambient-orb"></div>
    
    <header>
        <h1>Alien: Neural Stream v2.5</h1>
    </header>

    <div class="chat-container">
        <div id="messages">
            <div class="message">
                <span class="role-ai">ALIEN:</span>
                Quantum core initialized. Transmitting neural signals. Ready for instruction.
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Transmit neural pulse..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
        <div class="status">Neural Load: STRE-Optimized | Backend: Render-Ready Python</div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const display = document.getElementById('messages');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const val = input.value.trim();
            if(!val) return;

            appendMessage('USER', val);
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                appendMessage('AI', data.response);
            } catch (err) {
                appendMessage('AI', "Transmission failed. Is the engine running?");
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message';
            const span = document.createElement('span');
            span.className = role === 'USER' ? 'role-user' : 'role-ai';
            span.textContent = role + ':';
            div.appendChild(span);
            div.appendChild(document.createTextNode(text));
            display.appendChild(div);
            display.scrollTop = display.scrollHeight;
        }
    </script>
</body>
</html>
